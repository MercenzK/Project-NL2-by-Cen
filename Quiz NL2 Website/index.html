<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NL2 Med Quiz</title>
<style>
:root{--bg:#eef2f8;--card:#fff;--ink:#1f2937;--muted:#6b7280;--navy:#1f3b63;--blue:#1f4e79;
--ok:#1e7e34;--okbg:#e6f4ea;--bad:#b3261e;--badbg:#fdecea;--gold:#b8860b;--goldbg:#fff3cd;--line:#e3e8f0;--accent:#2e5b88;}
*{box-sizing:border-box}
body{margin:0;font-family:"TH Sarabun New","Sarabun","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:18px;line-height:1.55}
a{color:var(--blue)}
header{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#1f3b63,#2e5b88);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(0,0,0,.15)}
header .brand{font-size:22px;font-weight:800;cursor:pointer}
header .spacer{flex:1}
header .who{font-size:15px;opacity:.95}
.wrap{max-width:920px;margin:22px auto;padding:0 16px}
.btn{background:#1f4e79;color:#fff;border:none;border-radius:9px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:16px;font-family:inherit}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:rgba(255,255,255,.18)}
.btn.sec{background:#fff;color:#1f4e79;border:1.5px solid #cfe0f2}
.btn.danger{background:#b3261e}
.btn:disabled{opacity:.5;cursor:default}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.grid{grid-template-columns:1fr}body{font-size:17px}}
.qtitle{font-size:20px;font-weight:800;color:var(--navy);margin:0 0 4px}
.muted{color:var(--muted);font-size:15px}
.badge{display:inline-block;font-size:13px;background:#eaf1fb;color:#1f4e79;border-radius:12px;padding:2px 10px;font-weight:700;margin-left:6px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:10px 14px;margin:7px 0;cursor:pointer;font-size:17px;font-family:inherit;transition:.12s}
.opt:hover{border-color:#9db6d6;background:#f7faff}
.opt.sel{border-color:#1f4e79;background:#eef5ff}
.opt.correct{background:var(--okbg);border-color:var(--ok)}
.opt.wrong{background:var(--badbg);border-color:var(--bad)}
.opt .lab{font-weight:800;color:var(--blue);margin-right:8px}
.exp{margin-top:10px;border-radius:10px;padding:11px 14px;background:var(--goldbg);border:1px solid #ecd48a}
.exp .tag{font-weight:800;color:var(--gold)}
.res{font-weight:800} .res.ok{color:var(--ok)} .res.bad{color:var(--bad)}
.stem{font-weight:600;margin:6px 0 10px}
.qhead{display:flex;gap:8px;align-items:baseline;margin-bottom:6px}
.qnum{font-weight:800;color:var(--navy)}
input,select{font-family:inherit;font-size:16px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--line);width:100%}
label.fld{display:block;margin:10px 0 4px;font-weight:700;font-size:15px}
.pill{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:14px;font-weight:700}
.tablewrap{overflow:auto}
table{border-collapse:collapse;width:100%;font-size:16px}
th,td{border:1px solid var(--line);padding:8px 10px;text-align:left}
th{background:#e8eef8}
.scorebig{font-size:44px;font-weight:900;color:var(--navy)}
.modal-bg{position:fixed;inset:0;background:rgba(20,30,50,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:#fff;border-radius:14px;padding:22px;max-width:420px;width:100%}
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{padding:6px 14px;border-radius:8px;background:#eef2f8;cursor:pointer;font-weight:700}
.tab.active{background:#1f4e79;color:#fff}
.small{font-size:14px}
.progressbar{height:8px;background:#e3e8f0;border-radius:6px;overflow:hidden}
.progressbar>div{height:100%;background:#2e5b88}
.err{color:#b3261e;font-size:14px;margin-top:6px}
.ok-msg{color:#1e7e34;font-size:14px;margin-top:6px}
footer{max-width:920px;margin:0 auto 40px;padding:0 16px;color:var(--muted);font-size:14px;text-align:center}
</style>
</head>
<body>
<header>
  <span class="brand" onclick="go('home')">🩺 NL2 Med Quiz</span>
  <span class="pill" id="modePill"></span>
  <span class="spacer"></span>
  <span class="who" id="whoami"></span>
  <button class="btn ghost" id="authBtn" onclick="openAuth()">เข้าสู่ระบบ</button>
  <button class="btn ghost" id="histBtn" onclick="go('history')">ประวัติ</button>
</header>
<div class="wrap" id="app"></div>
<footer>NL2 Med Quiz • 500 ข้อ อายุรศาสตร์ • เฉลยอ้างอิงแนวทางล่าสุด — ตอนสอบยึดแนวทางไทยเป็นหลัก</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script>
const CFG = window.APP_CONFIG || {};
const LAB = ["A","B","C","D","E","F"];
let supa = null, user = null;
if (window.supabase && CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY) {
  try { supa = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY); } catch(e){ console.warn(e); }
}
const CLOUD = !!supa;

// ---------- storage helpers ----------
const LS = {
  get:(k,d)=>{ try{return JSON.parse(localStorage.getItem(k)) ?? d}catch(e){return d} },
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};
function customQuizzes(){ return LS.get('customQuizzes',[]); }
function allQuizzes(){ return [...window.QUIZ_DATA, ...customQuizzes()]; }
function findQuiz(id){ return allQuizzes().find(q=>q.id===id); }

// ---------- attempts (cloud or local) ----------
async function saveAttempt(a){
  if(CLOUD && user){
    const {error} = await supa.from('attempts').insert({
      quiz_id:a.quiz_id, quiz_title:a.quiz_title, score:a.score, total:a.total, answers:a.answers });
    if(error) console.warn(error);
  } else {
    const arr = LS.get('guestAttempts',[]);
    arr.unshift({...a, created_at:new Date().toISOString()});
    LS.set('guestAttempts', arr.slice(0,200));
  }
}
async function listAttempts(){
  if(CLOUD && user){
    const {data,error} = await supa.from('attempts').select('*').order('created_at',{ascending:false}).limit(200);
    if(error){console.warn(error);return[]} return data||[];
  }
  return LS.get('guestAttempts',[]);
}
async function bestScores(){
  const at = await listAttempts(); const best={};
  at.forEach(a=>{ const pct=a.score/a.total; if(!best[a.quiz_id]||pct>best[a.quiz_id].pct) best[a.quiz_id]={pct,score:a.score,total:a.total}; });
  return best;
}

// ---------- auth ----------
async function refreshUser(){
  if(!CLOUD){ user=null; }
  else { const {data} = await supa.auth.getSession(); user = data?.session?.user || null; }
  renderTopbar(); render();
}
function renderTopbar(){
  document.getElementById('modePill').textContent = CLOUD ? (user?'☁️ ล็อกอินแล้ว':'☁️ ยังไม่ล็อกอิน') : '💾 Guest mode';
  document.getElementById('whoami').textContent = user? user.email : '';
  document.getElementById('authBtn').textContent = user? 'ออกจากระบบ' : (CLOUD?'เข้าสู่ระบบ':'โหมดผู้เยี่ยม');
  document.getElementById('authBtn').onclick = user? doSignOut : openAuth;
}
async function doSignOut(){ if(supa) await supa.auth.signOut(); user=null; renderTopbar(); go('home'); }
function openAuth(){
  if(!CLOUD){ alert('ยังไม่ได้ตั้งค่า Supabase — ตอนนี้เว็บทำงานแบบ Guest (เก็บคะแนนในเครื่องนี้)\nดูวิธีเปิดล็อกอินได้ใน README'); return; }
  let tab='in';
  const bg=document.createElement('div'); bg.className='modal-bg';
  function draw(){
    bg.innerHTML=`<div class="modal">
      <div class="tabs"><div class="tab ${tab==='in'?'active':''}" id="tIn">เข้าสู่ระบบ</div><div class="tab ${tab==='up'?'active':''}" id="tUp">สมัครสมาชิก</div></div>
      <label class="fld">อีเมล</label><input id="em" type="email" placeholder="you@email.com">
      <label class="fld">รหัสผ่าน</label><input id="pw" type="password" placeholder="อย่างน้อย 6 ตัว">
      <div id="msg"></div>
      <div class="row" style="margin-top:14px"><button class="btn" id="goBtn">${tab==='in'?'เข้าสู่ระบบ':'สมัคร'}</button><button class="btn sec" id="closeBtn">ปิด</button></div>
    </div>`;
    bg.querySelector('#tIn').onclick=()=>{tab='in';draw()};
    bg.querySelector('#tUp').onclick=()=>{tab='up';draw()};
    bg.querySelector('#closeBtn').onclick=()=>bg.remove();
    bg.querySelector('#goBtn').onclick=async()=>{
      const em=bg.querySelector('#em').value.trim(), pw=bg.querySelector('#pw').value;
      const msg=bg.querySelector('#msg');
      msg.innerHTML='<div class="muted">กำลังดำเนินการ...</div>';
      let res;
      if(tab==='in') res=await supa.auth.signInWithPassword({email:em,password:pw});
      else res=await supa.auth.signUp({email:em,password:pw});
      if(res.error){ msg.innerHTML='<div class="err">'+res.error.message+'</div>'; return; }
      if(tab==='up' && !res.data.session){ msg.innerHTML='<div class="ok-msg">สมัครสำเร็จ! ถ้าเปิดยืนยันอีเมลไว้ ให้เช็คอีเมลก่อนเข้าสู่ระบบ</div>'; return; }
      bg.remove(); await refreshUser();
    };
  }
  draw(); document.body.appendChild(bg);
}

// ---------- router / state ----------
let state = { view:'home', quiz:null, cfg:null, session:null };
function go(v, extra={}){ state.view=v; Object.assign(state, extra); render(); window.scrollTo(0,0); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ---------- views ----------
async function render(){
  const app=document.getElementById('app');
  if(state.view==='home') return renderHome(app);
  if(state.view==='config') return renderConfig(app);
  if(state.view==='quiz') return renderQuiz(app);
  if(state.view==='result') return renderResult(app);
  if(state.view==='history') return renderHistory(app);
}

async function renderHome(app){
  const best = await bestScores();
  const qs = allQuizzes();
  app.innerHTML = `
   <div class="card">
     <h2 class="qtitle">คลังข้อสอบ NL2 (อายุรศาสตร์)</h2>
     <div class="muted">โจทย์ภาษาอังกฤษแนว NLE2 • เฉลยละเอียดภาษาไทย • ${qs.reduce((s,q)=>s+q.questions.length,0)} ข้อ</div>
     <div class="row" style="margin-top:12px">
       <button class="btn sec" onclick="startCombined()">🎲 สุ่มรวมทุกชุด (Exam mode)</button>
       <button class="btn sec" onclick="document.getElementById('upl').click()">⬆️ อัปโหลดชุดข้อสอบ</button>
       <input id="upl" type="file" accept=".json,.csv" style="display:none" onchange="handleUpload(event)">
     </div>
   </div>
   <div class="grid">
     ${qs.map(q=>{
        const b=best[q.id];
        return `<div class="card">
          <div class="qtitle" style="font-size:18px">${esc(q.title)}</div>
          <div class="muted">${q.questions.length} ข้อ ${q.custom?'<span class=badge>อัปโหลดเอง</span>':''}</div>
          ${b?`<div class="small" style="margin:8px 0;color:#1e7e34">คะแนนดีสุด ${b.score}/${b.total} (${Math.round(b.pct*100)}%)</div>`:'<div class="small muted" style="margin:8px 0">ยังไม่เคยทำ</div>'}
          <div class="row">
            <button class="btn" onclick="go('config',{quiz:'${q.id}'})">เริ่มทำ</button>
            ${q.custom?`<button class="btn danger" onclick="delCustom('${q.id}')">ลบ</button>`:''}
          </div>
        </div>`;
     }).join('')}
   </div>
   ${!CLOUD?`<div class="card small muted">💡 ตอนนี้เป็น <b>Guest mode</b> (เก็บคะแนนในเครื่องนี้). ถ้าอยากมีระบบล็อกอิน + คะแนนรายคนข้ามเครื่อง ให้ตั้งค่า Supabase ตาม README แล้วใส่ค่าใน config.js</div>`:''}
  `;
}

function renderConfig(app){
  const q=findQuiz(state.quiz);
  app.innerHTML=`
   <div class="card">
     <h2 class="qtitle">${esc(q.title)}</h2>
     <label class="fld">โหมด</label>
     <select id="mode">
       <option value="practice">ฝึก (Practice) — คลิกตอบแล้วเฉลยทันที</option>
       <option value="exam">สอบ (Exam) — ตอบครบแล้วกดส่ง</option>
     </select>
     <label class="fld">จำนวนข้อ</label>
     <select id="count">
       <option value="10">10 ข้อ</option>
       <option value="20">20 ข้อ</option>
       <option value="50">50 ข้อ</option>
       <option value="all" selected>ทั้งหมด (${q.questions.length})</option>
     </select>
     <label class="fld"><input type="checkbox" id="shuffleQ" checked style="width:auto"> สลับลำดับข้อ</label>
     <label class="fld"><input type="checkbox" id="shuffleO" style="width:auto"> สลับลำดับตัวเลือก</label>
     <label class="fld" id="timerWrap"><input type="checkbox" id="timer" style="width:auto"> จับเวลา (Exam) — 1 นาที/ข้อ</label>
     <div class="row" style="margin-top:16px">
       <button class="btn" onclick="beginQuiz()">เริ่ม</button>
       <button class="btn sec" onclick="go('home')">ย้อนกลับ</button>
     </div>
   </div>`;
}

function buildSession(quiz, opt){
  let items = quiz.questions.slice();
  if(opt.shuffleQ) items=shuffle(items);
  if(opt.count!=='all') items=items.slice(0, parseInt(opt.count));
  items = items.map(q=>{
    let choices=q.choices.map((c,i)=>({c,orig:i}));
    if(opt.shuffleO) choices=shuffle(choices);
    const ansIdx=choices.findIndex(x=>x.orig===q.ans);
    return {id:q.id,topic:q.topic,q:q.q,choices:choices.map(x=>x.c),ans:ansIdx,exp:q.exp};
  });
  return {quizId:quiz.id,quizTitle:quiz.title,mode:opt.mode,items,answers:{},submitted:false,
          timeLeft: (opt.mode==='exam'&&opt.timer)? items.length*60 : null};
}
function beginQuiz(){
  const q=findQuiz(state.quiz);
  const opt={ mode:val('mode'), count:val('count'),
    shuffleQ:chk('shuffleQ'), shuffleO:chk('shuffleO'), timer:chk('timer') };
  state.session=buildSession(q,opt);
  go('quiz');
  if(state.session.timeLeft!=null) startTimer();
}
function val(id){return document.getElementById(id).value;}
function chk(id){return document.getElementById(id).checked;}

let timerInt=null;
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    const s=state.session; if(!s||s.submitted){clearInterval(timerInt);return;}
    s.timeLeft--; const el=document.getElementById('timer-disp');
    if(el){const m=Math.floor(s.timeLeft/60),ss=s.timeLeft%60; el.textContent=`⏱ ${m}:${String(ss).padStart(2,'0')}`;}
    if(s.timeLeft<=0){clearInterval(timerInt); submitExam();}
  },1000);
}

function renderQuiz(app){
  const s=state.session;
  const answered=Object.keys(s.answers).length;
  app.innerHTML=`
   <div class="card">
     <div class="row"><b>${esc(s.quizTitle)}</b><span class="badge">${s.mode==='exam'?'Exam':'Practice'}</span>
       <span class="spacer" style="flex:1"></span>
       ${s.timeLeft!=null?`<span id="timer-disp" class="pill" style="background:#1f4e79;color:#fff"></span>`:''}
       <span class="muted" id="cnt">${answered}/${s.items.length}</span>
     </div>
     <div class="progressbar" style="margin-top:8px"><div id="pbar" style="width:${answered/s.items.length*100}%"></div></div>
   </div>
   <div id="qlist"></div>
   <div class="card">
     ${s.mode==='exam' && !s.submitted ? `<button class="btn" onclick="submitExam()">ส่งคำตอบ</button>`:''}
     ${s.mode==='practice' ? `<button class="btn" onclick="finishPractice()">ดูสรุปคะแนน / บันทึก</button>`:''}
     <button class="btn sec" onclick="go('home')">ออก</button>
   </div>`;
  const list=document.getElementById('qlist');
  s.items.forEach((q,i)=>list.appendChild(qCard(q,i)));
}

function qCard(q,i){
  const s=state.session; const chosen=s.answers[i]; const reveal = s.mode==='practice'? chosen!==undefined : s.submitted;
  const div=document.createElement('div'); div.className='card';
  div.innerHTML=`<div class="qhead"><span class="qnum">ข้อ ${i+1}</span><span class="badge">${esc(q.topic)}</span></div><div class="stem">${esc(q.q)}</div>`;
  q.choices.forEach((c,j)=>{
    const b=document.createElement('button'); b.className='opt';
    if(chosen===j) b.classList.add('sel');
    if(reveal){ if(j===q.ans)b.classList.add('correct'); if(j===chosen&&chosen!==q.ans)b.classList.add('wrong'); b.disabled = s.mode==='practice'; }
    b.innerHTML=`<span class="lab">${LAB[j]}.</span>${esc(c)}`;
    b.onclick=()=>selectAns(i,j);
    div.appendChild(b);
  });
  if(reveal){
    const ok=chosen===q.ans;
    const ex=document.createElement('div'); ex.className='exp';
    ex.innerHTML=`<div class="res ${ok?'ok':'bad'}">${chosen===undefined?'ไม่ได้ตอบ':(ok?'✔ ถูกต้อง':'✘ ยังไม่ถูก')} — คำตอบที่ถูกคือ ${LAB[q.ans]}</div><div><span class="tag">เฉลย:</span> ${esc(q.exp)}</div>`;
    div.appendChild(ex);
  }
  return div;
}

function selectAns(i,j){
  const s=state.session;
  if(s.mode==='practice'){ if(s.answers[i]!==undefined) return; s.answers[i]=j; }
  else { if(s.submitted) return; s.answers[i]=j; }
  const answered=Object.keys(s.answers).length;
  const cnt=document.getElementById('cnt'); if(cnt)cnt.textContent=`${answered}/${s.items.length}`;
  const pb=document.getElementById('pbar'); if(pb)pb.style.width=(answered/s.items.length*100)+'%';
  // re-render just this card in practice mode (to reveal), or update selection in exam
  const list=document.getElementById('qlist');
  const newCard=qCard(state.session.items[i],i);
  list.replaceChild(newCard, list.children[i]);
}

async function submitExam(){
  const s=state.session; if(s.submitted) return;
  s.submitted=true; clearInterval(timerInt);
  let score=0; s.items.forEach((q,i)=>{ if(s.answers[i]===q.ans) score++; });
  s.score=score;
  await saveAttempt({quiz_id:s.quizId,quiz_title:s.quizTitle,score,total:s.items.length,
    answers:s.items.map((q,i)=>({id:q.id,chosen:s.answers[i]??null,correct:q.ans}))});
  go('result');
}
async function finishPractice(){
  const s=state.session; let score=0; s.items.forEach((q,i)=>{ if(s.answers[i]===q.ans) score++; });
  s.score=score; s.submitted=true;
  await saveAttempt({quiz_id:s.quizId,quiz_title:s.quizTitle,score,total:s.items.length,
    answers:s.items.map((q,i)=>({id:q.id,chosen:s.answers[i]??null,correct:q.ans}))});
  go('result');
}

function renderResult(app){
  const s=state.session; const pct=Math.round(s.score/s.items.length*100);
  app.innerHTML=`
   <div class="card" style="text-align:center">
     <div class="muted">${esc(s.quizTitle)}</div>
     <div class="scorebig">${s.score}/${s.items.length}</div>
     <div class="qtitle" style="color:${pct>=60?'#1e7e34':'#b3261e'}">${pct}%</div>
     <div class="muted">${pct>=80?'เยี่ยมมาก!':pct>=60?'ผ่านเกณฑ์ ทบทวนข้อที่ผิดต่อ':'ทบทวนเฉลยด้านล่างแล้วลองใหม่'}</div>
     <div class="row" style="justify-content:center;margin-top:14px">
       <button class="btn" onclick="go('config',{quiz:'${s.quizId.startsWith('combined')?state.quiz:s.quizId}'})">ทำใหม่</button>
       <button class="btn sec" onclick="go('home')">หน้าแรก</button>
       <button class="btn sec" onclick="go('history')">ดูประวัติ</button>
     </div>
   </div>
   <div class="card"><b>ทบทวนคำตอบ</b></div>
   <div id="review"></div>`;
  const rv=document.getElementById('review');
  state.session.items.forEach((q,i)=>rv.appendChild(qCard(q,i)));
}

async function renderHistory(app){
  app.innerHTML=`<div class="card"><b>กำลังโหลดประวัติ...</b></div>`;
  const at=await listAttempts();
  app.innerHTML=`
   <div class="card">
     <h2 class="qtitle">ประวัติการทำข้อสอบ ${CLOUD&&user?'(บัญชี '+esc(user.email)+')':'(เครื่องนี้)'}</h2>
     ${at.length===0?'<div class="muted">ยังไม่มีประวัติ</div>':`
     <div class="tablewrap"><table>
       <tr><th>วันที่</th><th>ชุด</th><th>คะแนน</th><th>%</th></tr>
       ${at.map(a=>`<tr><td>${new Date(a.created_at).toLocaleString('th-TH')}</td><td>${esc(a.quiz_title||a.quiz_id)}</td><td>${a.score}/${a.total}</td><td>${Math.round(a.score/a.total*100)}%</td></tr>`).join('')}
     </table></div>`}
     <div class="row" style="margin-top:14px"><button class="btn sec" onclick="go('home')">หน้าแรก</button>
     ${!CLOUD?`<button class="btn danger" onclick="if(confirm('ลบประวัติในเครื่องนี้?')){localStorage.removeItem(\'guestAttempts\');go(\'history\')}">ล้างประวัติ</button>`:''}</div>
   </div>`;
}

// ---------- combined + upload ----------
function startCombined(){
  const all=[]; window.QUIZ_DATA.forEach(q=>q.questions.forEach(x=>all.push(x)));
  const quiz={id:'combined',title:'สุ่มรวมทุกชุด',questions:all};
  // temp register
  state._combined=quiz;
  const _find=findQuiz; window._tmpFind=null;
  state.quiz='combined';
  // monkey: buildSession uses findQuiz; make combined resolvable
  window.__combined=quiz;
  go('config',{quiz:'combined'});
}
const _findQuizOrig=findQuiz;
function findQuizPatched(id){ if(id==='combined'&&window.__combined) return window.__combined; return _findQuizOrig(id); }
findQuiz=findQuizPatched;

function handleUpload(ev){
  const f=ev.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      let quiz;
      if(f.name.toLowerCase().endsWith('.json')){
        const j=JSON.parse(rd.result);
        const questions = Array.isArray(j)? j : j.questions;
        quiz={id:'custom-'+Date.now(),title:(j.title||f.name.replace(/\.json$/i,'')),custom:true,
          questions:questions.map(normQ)};
      } else {
        quiz={id:'custom-'+Date.now(),title:f.name.replace(/\.csv$/i,''),custom:true,questions:parseCSV(rd.result)};
      }
      quiz.questions=quiz.questions.filter(Boolean);
      if(!quiz.questions.length){alert('ไม่พบข้อสอบในไฟล์ (ตรวจรูปแบบใน README)');return;}
      const cs=customQuizzes(); cs.push(quiz); LS.set('customQuizzes',cs);
      alert('อัปโหลดสำเร็จ: '+quiz.title+' ('+quiz.questions.length+' ข้อ)');
      go('home');
    }catch(e){ alert('อ่านไฟล์ไม่สำเร็จ: '+e.message); }
  };
  rd.readAsText(f);
}
function normQ(o){
  const choices=o.choices||[o.A,o.B,o.C,o.D,o.E].filter(x=>x!=null);
  let ans=o.ans; if(typeof ans==='string') ans=LAB.indexOf(ans.trim().toUpperCase());
  if(ans==null&&o.answer!=null){ans=typeof o.answer==='number'?o.answer:LAB.indexOf(String(o.answer).trim().toUpperCase());}
  if(choices.length<2||ans==null||ans<0) return null;
  return {id:'u'+Math.random().toString(36).slice(2),topic:o.topic||'Custom',q:o.q||o.question,choices,ans,exp:o.exp||o.explanation||''};
}
function parseCSV(txt){
  const rows=csvRows(txt); if(!rows.length)return[];
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const idx=n=>head.indexOf(n);
  return rows.slice(1).map(r=>{
    const get=n=>{const i=idx(n);return i>=0?r[i]:'';};
    const choices=[get('a'),get('b'),get('c'),get('d'),get('e')].filter(x=>x!=='');
    let ans=get('answer')||get('ans'); ans=isNaN(+ans)?LAB.indexOf(String(ans).trim().toUpperCase()):+ans;
    if(choices.length<2||ans<0) return null;
    return {id:'u'+Math.random().toString(36).slice(2),topic:get('topic')||'Custom',q:get('question')||get('q'),choices,ans,exp:get('explanation')||get('exp')};
  }).filter(Boolean);
}
function csvRows(txt){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<txt.length;i++){const c=txt[i];
    if(q){ if(c==='"'){ if(txt[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(c==='\r'){} else cur+=c; }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(x=>x.trim()!==''));
}
function delCustom(id){ if(!confirm('ลบชุดข้อสอบนี้?'))return; LS.set('customQuizzes',customQuizzes().filter(q=>q.id!==id)); go('home'); }

// ---------- boot ----------
if(CLOUD){ supa.auth.onAuthStateChange((_e,sess)=>{ user=sess?.user||null; renderTopbar(); }); }
refreshUser();
</script>
